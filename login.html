<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* Glass Card */
.container{
    width:350px;
    padding:30px;
    border-radius:15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
    color:white;
    text-align:center;
}

/* Title */
.container h2{
    margin-bottom:20px;
}

/* Inputs */
.input-box{
    position:relative;
    margin:15px 0;
}

.input-box input{
    width:100%;
    padding:12px;
    border:none;
    outline:none;
    border-radius:8px;
    background:rgba(255,255,255,0.2);
    color:white;
    font-size:14px;
}

.input-box input::placeholder{
    color:#ddd;
}

/* Button */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#00c6ff;
    background:linear-gradient(to right,#00c6ff,#0072ff);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* Message */
#msg{
    margin-top:10px;
}

/* Register link */
.register{
    margin-top:15px;
    font-size:14px;
}

.register a{
    color:#00c6ff;
    text-decoration:none;
}

.register a:hover{
    text-decoration:underline;
}
</style>

</head>

<body>


<div class="container">
    <h2>Welcome Back 👋</h2>

    <div class="input-box">
        <input type="email" id="email" placeholder="Enter Email">
    </div>

    <div class="input-box">
        <input type="password" id="password" placeholder="Enter Password">
    </div>

    <button onclick="login()">Login</button>

    <div id="msg"></div>

    <div class="register">
        Don't have an account? 
        <a href="register.html">Register</a>
    </div>
</div>

<script>
function login(){
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    fetch("api/login.php", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ email, password })
    })
    .then(res=>res.json())
    .then(data=>{
        let msg = document.getElementById("msg");

        if(data.status==="success"){
            msg.style.color="lightgreen";
            msg.innerHTML="Login Successful!";
            setTimeout(()=>{
                window.location.href="/business-app/dashboard.php";
            },1000);
        }else{
            msg.style.color="red";
            msg.innerHTML=data.message;
        }
    })
    .catch(()=>{
        document.getElementById("msg").innerHTML="Server error!";
    });
}
</script>

</body>
</html>
